<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Árbol de Habilidades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="top-bar">
    Árbol de Habilidades
</header>

<div id="skill-tree-container">
    <div id="skill-tree"></div>
</div>

<button id="back-to-game">Volver al Juego</button>

<script>
    // Botón para volver al juego
    document.getElementById("back-to-game").addEventListener("click",()=>{
        window.location.href = "index.html";
    });

    // Aquí se puede cargar skills desde API igual que en index.js
    async function loadSkills(){
        const response = await fetch("/api/game/skills");
        const skills = await response.json();
        const container = document.getElementById("skill-tree");
        container.innerHTML = "";
        skills.forEach((s,index)=>{
            const div = document.createElement("div");
            div.className = "skill";
            div.innerHTML=`
                <b>${s.name}</b><br>
                ${s.description}<br>
                Nivel: ${s.level}/${s.maxLevel}<br>
                Coste: ${s.prestigeCost}<br>
                <button onclick="buySkill(${index})">Comprar</button>
            `;
            container.appendChild(div);
        });
    }

    async function buySkill(index){
        const response = await fetch(`/api/game/skill/${index}`,{method:"POST"});
        const success = await response.json();
        if(success) loadSkills();
    }

    loadSkills();
</script>

</body>
</html>
